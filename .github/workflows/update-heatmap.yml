name: Update Org Activity Heatmap

on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Generate heatmap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ORG_NAME: LITTLETASK
        run: python scripts/generate_heatmap.py
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f profile/
          git add scripts/heatmap_cache.json scripts/repo_file_cache.json
          git diff --cached --quiet || git commit -m "chore: update heatmap [skip ci]"
          git push
